{% extends 'Dashboard.html' %}
{% block content %}

<div class="bg-light rounded h-100 p-4">
    <h6 class="mb-4">Edit Student</h6>

```
<form method="POST" action="{% url 'update_student' studata.id %}" enctype="multipart/form-data">
    {% csrf_token %}
    

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Name</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" name="name" value="{{studata.Name}}">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
            <input type="email" class="form-control" name="email" value="{{studata.Email}}">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Date of Birth</label>
        <div class="col-sm-10">
            <input type="date" class="form-control" name="dob" value="{{studata.Dob|date:'Y-m-d'}}">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Roll Number</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" name="roll_number" value="{{studata.Roll_Number}}">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Phone Number</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" name="phone_number" value="{{studata.Phone_number}}">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Class</label>
        <div class="col-sm-10">
            <select class="form-control" name="class">

                {% for c in classes %}
                <option value="{{c.id}}"
                {% if studata.Class.id == c.id %}
                selected
                {% endif %}
                >
                {{c.Class_Name}}-{{c.Section}}
                </option>
                {% endfor %}

            </select>
        </div>
    </div>

    <fieldset class="row mb-3">
        <legend class="col-form-label col-sm-2 pt-0">Gender</legend>

        <div class="col-sm-10">

            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" value="Male"
                {% if studata.gender == 'Male' %}checked{% endif %}>
                <label class="form-check-label">
                    Male
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="gender" value="Female"
                {% if studata.gender == 'Female' %}checked{% endif %}>
                <label class="form-check-label">
                    Female
                </label>
            </div>

        </div>
    </fieldset>


    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Student Photo</label>
        <div class="col-sm-10">

            {% if student.Student_Photo %}
            <img src="{{studata.Student_Photo.url}}" width="80" style="margin-bottom:10px;">
            {% endif %}

            <input type="file" class="form-control" name="photo">
        </div>
    </div>


    <button type="submit" class="btn btn-success">Update Student</button>

</form>
```
