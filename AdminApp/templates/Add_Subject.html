{% extends 'Dashboard.html' %}
{% block content %}

<div class="bg-light rounded h-100 p-4">
    <h6 class="mb-4">Add Subject</h6>

```
<form method="POST" action="{% url 'save_subject' %}" onsubmit="return validateForm()">
    {% csrf_token %}

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Subject Name</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="subject_name" name="subject_name">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Subject Code</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="subject_code" name="subject_code">
        </div>
    </div>

    <div class="row mb-3">
        <label class="col-sm-2 col-form-label">Credits</label>
        <div class="col-sm-10">
            <input type="number" class="form-control" id="subject_credit" name="subject_credit">
        </div>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>

</form>
```

</div>

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script>

function validateForm(){

    var name = document.getElementById("subject_name").value.trim();
    var code = document.getElementById("subject_code").value.trim();
    var credit = document.getElementById("subject_credit").value;

    if(name == ""){
        swal("Error","Subject Name is required","error");
        return false;
    }

    if(!/^[A-Za-z0-9 ]+$/.test(name)){
        swal("Error","Subject Name can contain letters, numbers and spaces only","error");
        return false;
    }

    if(code == ""){
        swal("Error","Subject Code is required","error");
        return false;
    }

    if(!/^[A-Za-z0-9]+$/.test(code)){
        swal("Error","Subject Code must contain only letters and numbers","error");
        return false;
    }

    if(credit == ""){
        swal("Error","Credits is required","error");
        return false;
    }

    if(credit <= 0){
        swal("Error","Credits must be greater than 0","error");
        return false;
    }

    return true;
}

</script>

{% if messages %}
{% for msg in messages %}
{% if msg.tags == 'success' %} <script>
swal('{{msg}}','','success') </script>
{% elif msg.tags == 'warning' %} <script>
swal('{{msg}}','','warning') </script>
{% elif msg.tags == 'error' %} <script>
swal('{{msg}}','','error') </script>
{% endif %}
{% endfor %}
{% endif %}

{% endblock %}
