<!DOCTYPE html>
{% extends 'Dashboard.html' %}
{% block content %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="bg-light rounded h-100 p-4">
        <h6 class="mb-4">Add Result</h6>
        <form method="post" action="{% url 'save_result' %}">
            {% csrf_token %}
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">Class</label>
                <div class="col-sm-10">

                    <select class="form-control" name="class" id="class_id">
                        <option value="">-- Select Class --</option>
                        {% for c in classes %}
                        <option value="{{c.id}}">{{c.Class_Name}}-{{c.Section}}</option>
                        {% endfor %}
                    </select>

                </div>
            </div>
            <div class="row mb-3">
                <label class="col-sm-2 col-form-label">Student</label>
                <div class="col-sm-10">

                    <select class="form-control" name="student" id="student">
                        <option value="">-- Select Student --</option>



                    </select>
                    <div class="row mt-3">
                        
                        <div class="col-sm-10" id="subject_container">
                            <!-- subjects will load here -->
                        </div>
                    </div>

                </div>
            </div>



            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
    <script>
        function must() {
            name = document.getElementById("Name").value;
            email = document.getElementById("inputEmail3").value;
            dob = document.getElementById("DateOfBirth").value;
            id = document.getElementById("id").value;
            Class = document.getElementById("class").value;
            gender = document.getElementById("gender").value;
            if (name == '' || email == '' || dob == '' || id == '' || Class == '' || gender == '') {
                alert("All fields are required");
                return false;
            }
            else {
                alert("Student added successfully");
                return true;
            }

        }
        document.getElementById("class_id").addEventListener("change", function () {

            const classID = this.value;
            if (!classID) return;

            fetch(`/manage/get_students_subjects?class_id=${classID}`)
                .then(res => res.json())
                .then(data => {

                    // ===== STUDENTS =====
                    const studentSelect = document.getElementById("student");
                    studentSelect.innerHTML = '<option value="">-- Select Student --</option>';

                    data.students.forEach(student => {
                        const option = document.createElement("option");
                        option.value = student.id;
                        option.textContent = student.Name;
                        studentSelect.appendChild(option);
                    });

                    // ===== SUBJECTS =====
                    const subjectDiv = document.getElementById("subject_container");
                    subjectDiv.innerHTML = "";

                    data.subjects.forEach(sub => {
                        subjectDiv.innerHTML += `
                <div style="margin-bottom:10px;">
                    <label>${sub.name}</label>
                    <input type="number" name="mark_${sub.id}" class="form-control" placeholder="Enter mark">
                </div>
            `;
                    });

                });

        });

    </script>
</body>

</html>
{% endblock %}
