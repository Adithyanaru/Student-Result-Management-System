<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Edit Profile</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="{% static 'assets/main/css/style.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

</head>

<body>


    <div class="container py-5">
        <div class="row">


            <!-- PROFILE IMAGE CARD -->
            <div class="col-md-4 text-center">
                <div class="card shadow">

                    <div class="card-body">

                        {% if data.Student_Photo %}
                        <img id="profilePreview" src="{{ data.Student_Photo.url }}" class="rounded-circle mb-3"
                            width="150" height="150">

                        {% else %}

                        <img id="profilePreview" src="{% static 'assets/main/img/default-user.png' %}"
                            class="rounded-circle mb-3" width="150" height="150">

                        {% endif %}

                        <h4 class="text-primary">{{ data.Name }}</h4>
                        <p class="text-muted">Student</p>

                    </div>

                </div>
            </div>



            <!-- EDIT PROFILE FORM -->
            <div class="col-md-8">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">
                        <h4>Edit Profile</h4>
                    </div>

                    <div class="card-body">

                        <form method="POST" enctype="multipart/form-data">

                            {% csrf_token %}


                            <!-- NAME -->
                            <div class="row mb-3">
                                <div class="col-sm-4">
                                    <strong>Name</strong>
                                </div>

                                <div class="col-sm-8">
                                    <input type="text" name="name" class="form-control" value="{{ data.Name }}">
                                </div>
                            </div>

                            <hr>


                            <!-- EMAIL -->
                            <div class="row mb-3">
                                <div class="col-sm-4">
                                    <strong>Email</strong>
                                </div>

                                <div class="col-sm-8">
                                    <input type="email" name="email" class="form-control" value="{{ data.Email }}">
                                </div>
                            </div>

                            <hr>


                            <!-- PHONE -->
                            <div class="row mb-3">
                                <div class="col-sm-4">
                                    <strong>Phone</strong>
                                </div>

                                <div class="col-sm-8">
                                    <input type="text" name="phone" class="form-control" value="{{ data.Phone_number }}">
                                </div>
                            </div>

                            <hr>


                            <!-- PHOTO -->
                            <div class="row mb-3">
                                <div class="col-sm-4">
                                    <strong>Change Photo</strong>
                                </div>

                                <div class="col-sm-8">

                                    <input type="file" name="photo" class="form-control" onchange="previewImage(event)">

                                </div>
                            </div>



                            <button class="btn btn-primary mt-3">
                                Update Profile
                            </button>

                            <a href="{% url 'profile' %}" class="btn btn-secondary mt-3">
                                Cancel
                            </a>


                        </form>

                    </div>
                </div>

            </div>

        </div>
    </div>



    <!-- JS FOR IMAGE PREVIEW -->

    <script>

        function previewImage(event) {

            const reader = new FileReader();

            reader.onload = function () {

                const output = document.getElementById('profilePreview');

                output.src = reader.result;

            };

            reader.readAsDataURL(event.target.files[0]);

        }

    </script>


</body>

</html>
