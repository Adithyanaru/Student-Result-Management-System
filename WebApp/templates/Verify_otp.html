<!doctype html>
{% load static %}
<html lang="en">

<head>
    <title>OTP Verification</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
            font-family:'Lato',sans-serif;
        }

        .otp-container{
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .otp-card{
            background:white;
            padding:40px;
            width:100%;
            max-width:420px;
            border-radius:8px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .otp-icon{
            width:70px;
            height:70px;
            background:#007bff;
            color:white;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            margin:auto;
            margin-bottom:15px;
        }

        .otp-title{
            font-weight:600;
            margin-bottom:20px;
        }

        .otp-input{
            height:45px;
            text-align:center;
            font-size:18px;
            letter-spacing:5px;
        }

        .verify-btn{
            height:45px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="otp-container">

    <div class="otp-card text-center">

        <div class="otp-icon">
            🔐
        </div>

        <h4 class="otp-title">OTP Verification</h4>

        <p class="text-muted mb-4">
            Enter the OTP sent to your registered mobile number
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="otp" class="form-control otp-input"
                       placeholder="Enter OTP" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 verify-btn">
                Verify OTP
            </button>

        </form>

    </div>

</div>

</body>
</html>
